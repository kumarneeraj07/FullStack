name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============ BACKEND CI ============
  backend:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Install test dependencies (SQLite for in-memory testing)
        working-directory: backend
        run: npm install --no-save better-sqlite3 sqlite3

      - name: Run linting check
        working-directory: backend
        run: |
          echo "Checking for syntax errors..."
          node --check src/server.js
          node --check src/app.js
          echo "✓ No syntax errors found"

      - name: Verify application starts
        working-directory: backend
        env:
          DATABASE_URL: sqlite::memory:
          JWT_SECRET: ci-test-secret
          NODE_ENV: test
        run: |
          echo "Verifying app module loads correctly..."
          node -e "import('./src/app.js').then(() => console.log('✓ App loads successfully'))"

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite::memory:
          JWT_SECRET: ci-test-secret
          NODE_ENV: test
        run: |
          echo "Running integration tests..."
          node scripts/verify.mjs

  # ============ FRONTEND CI ============
  frontend:
    name: Frontend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: https://cinebook-api.onrender.com/api
        run: npm run build

      - name: Verify build output
        working-directory: frontend
        run: |
          echo "Checking build output..."
          ls -la dist/
          test -f dist/index.html && echo "✓ index.html exists"
          test -d dist/assets && echo "✓ assets directory exists"
          echo "✓ Frontend build successful"

  # ============ DEPLOY ============
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy notification
        run: |
          echo "============================================"
          echo "  CI/CD Pipeline Passed!"
          echo "  Branch: main"
          echo "  Deploying to Render (auto-deploy)..."
          echo "============================================"
          echo ""
          echo "Backend:  https://cinebook-api.onrender.com"
          echo "Frontend: https://cinebook-frontend.onrender.com"
          echo ""
          echo "Render auto-deploys on push to main."
          echo "Deployment triggered successfully."
